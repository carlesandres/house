name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run format:check
      - run: bun test
      - run: npm pack --dry-run

  npm-install-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.22.2, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - name: Build npm tarball
        run: npm pack
      - name: Enforce engine compatibility
        run: npm config set engine-strict true
      - name: Global install smoke test from tarball
        run: |
          version="$(node -p "require('./package.json').version")"
          npm install -g "./carlesandres-house-${version}.tgz" --prefix "${RUNNER_TEMP}/npm-global"
